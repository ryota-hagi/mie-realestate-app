  const headerIcon = `<svg class="comp-sidebar-header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="5" rx="1"/><rect x="2" y="10" width="20" height="5" rx="1"/><rect x="2" y="17" width="20" height="5" rx="1"/></svg>`;
  const backArrow = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>`;
  const emptyIcon = `<svg class="comp-sidebar-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`;

  return `
    <div class="flex-shrink-0" style="width:220px;">
      <!-- デスクトップ版サイドバー -->
      <div class="comp-sidebar-desktop">
        <div class="comp-sidebar-card">
          <div class="comp-sidebar-header">
            <div class="comp-sidebar-header-title">${headerIcon} 比較表一覧</div>
            ${comps.length > 0 ? `<span class="comp-sidebar-count-badge">${comps.length}</span>` : ''}
          </div>
          ${isCompareView ? `
            <button onclick="state.soView=null; state.soComparison=null; render();" class="comp-sidebar-back-btn">
              ${backArrow} 物件リストに戻る
            </button>
          ` : ''}
          <div class="comp-sidebar-list">
            ${comps.length === 0 ? `
              <div class="comp-sidebar-empty">
                ${emptyIcon}
                比較表を作成すると<br>ここに一覧表示されます
              </div>
            ` : ''}
            ${comps.map(c => {
              const isActive = isCompareView && c.id === currentId;
              const dateStr = c.created_at ? new Date(c.created_at).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' }) : '';
              const count = (c.property_ids || []).length;
              return `
                <div class="comp-sidebar-item ${isActive ? 'active' : ''}" onclick="loadComparisonDetail('${c.id}')">
                  <div class="flex-1 min-w-0">
                    <div class="comp-sidebar-item-name">${c.name || '比較表'}</div>
                    <div class="comp-sidebar-item-meta">
                      <span>${dateStr}</span>
                      <span class="comp-sidebar-item-meta-dot"></span>
                      <span class="comp-sidebar-item-count">${count}件</span>
                    </div>
                  </div>
                  <button onclick="event.stopPropagation(); handleDeleteComparison('${c.id}')" class="comp-sidebar-delete-btn" title="削除">✕</button>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>
      <!-- モバイル版コンパクトバー -->
      <div class="comp-sidebar-mobile">
        <button class="comp-mobile-back-btn" onclick="state.soView=null; state.soComparison=null; render();" title="物件リストへ戻る">←</button>
        <select onchange="if(this.value) loadComparisonDetail(this.value);">
          ${comps.length === 0 ? `<option value="">比較表なし</option>` : ''}
          ${comps.map(c => {
            const dateStr = c.created_at ? new Date(c.created_at).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' }) : '';
            const n = (c.property_ids||[]).length;
            return `<option value="${c.id}" ${c.id === currentId ? 'selected' : ''}>${c.name || '比較表'} (${dateStr} ${n}件)</option>`;
          }).join('')}
        </select>
        <span class="comp-mobile-count">${comps.length}表</span>
      </div>
    </div>
  `;
}

function renderComparisonWithSidebar() {
  return `
    <div class="flex gap-4 fade-in comp-layout-sidebar" style="min-height:60vh;">
      ${renderComparisonSidebar()}
      <div class="flex-1 min-w-0">
        ${renderComparisonTable()}
      </div>
    </div>
  `;
}

function renderComparisonTable() {
  const comp = state.soComparison;
  if (!comp) return '';
  const props = comp.properties || [];
  if (props.length === 0) return '';

  const labels = ['A','B','C','D','E'];
  const COLORS = ['#2563eb','#16a34a','#9333ea','#f59e0b','#ef4444'];

  // ===== スコア計算 =====
  const allScores = props.map(p => calculateScores(p, state.userProfile));
  const hasScores = allScores.some(s => s);
  const maxTotal = Math.max(...allScores.map(s => s ? s.score_total : 0));
  const bestIdx = hasScores ? allScores.findIndex(s => s && s.score_total === maxTotal && maxTotal > 0) : -1;
  const hasLifestyle = allScores.some(s => s && s.score_lifestyle !== null);

  // ===== スコア色 =====
  function sc(v) { return v >= 80 ? '#16a34a' : v >= 60 ? '#2563eb' : v >= 40 ? '#f59e0b' : '#dc2626'; }

  // ===== 建築費 =====
  const costs = props.map(p => calcBuildingCost(p));
  const fmtYen = v => v >= 100000000 ? (v/100000000).toFixed(2) + '億円' : Math.round(v/10000).toLocaleString() + '万円';

  // ===== ハザードリスクレベル =====
  function compRiskLevel(text) {
    if (!text) return 'unknown';
    const first = text.split(/[。（(]/)[0].trim();
    if (/^高/.test(first)) return 'high';
    if (/^中/.test(first)) return 'mid';
    if (/^低/.test(first)) return 'low';
    if (first.includes('高')) return 'high';
    if (first.includes('中')) return 'mid';
    return 'low';
  }
  function compRiskBadgeHtml(text, id) {
    if (!text) return '<span style="color:#9ca3af;">—</span>';
    const level = compRiskLevel(text);
    const cls = level === 'high' ? 'so-comp-hz-high' : level === 'mid' ? 'so-comp-hz-mid' : 'so-comp-hz-low';
    const lbl = level === 'high' ? '高' : level === 'mid' ? '中' : '低';
    return '<div>' +
      '<span class="so-comp-hz-badge ' + cls + '" onclick="event.stopPropagation();toggleCompHzDetail(\'' + id + '\')">' +
      (lbl === '低' ? '✓' : '⚠') + ' ' + lbl + 'リスク <span style="font-size:9px;opacity:0.7;">▼</span></span>' +
      '<div class="so-comp-hz-detail" id="' + id + '">' + text + '</div></div>';
  }

  // ===== questions =====
  let questions = [];
  try { questions = typeof comp.questions === 'string' ? JSON.parse(comp.questions) : (comp.questions || []); } catch(e) { questions = []; }
  if (typeof questions === 'string') questions = questions.split('\n').filter(q => q.trim());

  // ===== 編集可能セル（テーブル用） =====
  function editTd(prop, key, displayVal, editType) {
    if (!editType) return '<td style="padding:8px 10px;font-size:12px;color:#1f2937;min-width:120px;border-bottom:1px solid #f3f4f6;vertical-align:top;">' + displayVal + '</td>';
    return '<td class="so-comp-editable-cell" style="padding:8px 10px;font-size:12px;color:#1f2937;min-width:120px;border-bottom:1px solid #f3f4f6;vertical-align:top;" onclick="startCellEdit(this, \'' + prop.id + '\', \'' + key + '\', \'' + editType + '\')" title="クリックして編集">' + displayVal + '<span style="color:#d1d5db;font-size:10px;margin-left:3px;">✏️</span></td>';
  }

  // ===== サマリーカード =====
  const summaryCards = `<div class="so-comp-summary-bar">
    ${props.map((p, i) => {
      const s = allScores[i];
      const isBest = i === bestIdx;
      const score = s ? s.score_total : '—';
      const priceStr = p.price ? (p.price/10000).toLocaleString() + '万円' : '—';
      const tsubo = p.land_area ? (p.land_area / 3.305785).toFixed(1) : '';
      const tsuboPrice = p.price && p.land_area ? (p.price / (p.land_area / 3.305785) / 10000).toFixed(1) + '万/坪' : '';
      const subStr = [tsubo ? tsubo + '坪' : '', tsuboPrice].filter(Boolean).join(' · ');
      return '<div class="so-comp-summary-card' + (isBest ? ' best' : '') + '" onclick="openPropertyDetailModal(' + i + ')">' +
        '<div class="so-comp-label-chip" style="background:' + COLORS[i] + ';">' + labels[i] + '</div>' +
        '<div class="so-comp-summary-name">' + (p.address || AREAS.find(a=>a.id===p.area_id)?.name || '物件' + labels[i]) + '</div>' +
        '<div class="so-comp-summary-score" style="color:' + (s ? sc(s.score_total) : '#9ca3af') + ';">' + score + '</div>' +
        '<div class="so-comp-summary-score-label">総合スコア</div>' +
        '<div class="so-comp-summary-price">' + priceStr + '</div>' +
        '<div class="so-comp-summary-sub">' + subStr + '</div>' +
      '</div>';
    }).join('')}
  </div>`;

  // ===== アコーディオンヘルパー =====
  function accSection(id, icon, title, count, isOpen, bodyHtml) {
    return '<div class="so-comp-acc-section' + (isOpen ? ' open' : '') + '" id="so-comp-acc-' + id + '">' +
      '<div class="so-comp-acc-header" onclick="toggleCompAccordion(\'so-comp-acc-' + id + '\')">' +
      '<h3>' + icon + ' ' + title + (count ? ' <span class="so-comp-count">（' + count + '）</span>' : '') + '</h3>' +
      '<span class="so-comp-chev">▼</span></div>' +
      '<div class="so-comp-acc-body">' + bodyHtml + '</div></div>';
  }

  // ===== セクション: スコア比較 =====
  function renderScoreSection() {
    if (!hasScores) return '<div style="padding:14px;font-size:12px;color:#9ca3af;">スコアデータなし（AI分析後に表示）</div>';
    const scoreKeys = ['score_safety','score_convenience','score_cost'];
    if (hasLifestyle) scoreKeys.push('score_lifestyle');
    const labelMap = {score_safety:'🛡️ 安全', score_convenience:'🏪 利便', score_cost:'💰 コスト', score_lifestyle:'🏡 ライフ'};
    let html = '<div style="overflow-x:auto;"><table class="so-comp-t-table">';
    // 総合
    html += '<tr><th>総合</th>' + props.map((p,i) => {
      const s = allScores[i];
      if (!s) return '<td style="text-align:center;color:#d1d5db;">—</td>';
      const isBest = s.score_total === maxTotal && maxTotal > 0;
      return '<td class="' + (isBest ? 'so-comp-highlight-cell' : '') + '" style="text-align:center;">' +
        '<span style="font-size:20px;font-weight:900;color:' + sc(s.score_total) + ';">' + s.score_total + '</span>' +
        (isBest ? ' 👑' : '') + '</td>';
    }).join('') + '</tr>';
    // カテゴリ
    scoreKeys.forEach(key => {
      const vals = allScores.map(s => s && s[key] != null ? s[key] : 0);
      const maxCat = Math.max(...vals);
      html += '<tr><th>' + labelMap[key] + '</th>' + props.map((p,i) => {
        const s = allScores[i];
        if (!s || s[key] == null) return '<td style="text-align:center;color:#d1d5db;">—</td>';
        const v = s[key];
        const best = v === maxCat && maxCat > 0;
        return '<td class="' + (best ? 'so-comp-highlight-cell' : '') + '">' +
          '<div class="so-comp-score-bar"><div class="so-comp-score-bar-track"><div class="so-comp-score-bar-fill" style="width:' + v + '%;background:' + sc(v) + ';"></div></div>' +
          '<span class="so-comp-score-val" style="color:' + sc(v) + ';">' + v + '</span>' +
          (best ? '<span style="font-size:9px;">★</span>' : '') + '</div></td>';
      }).join('') + '</tr>';
    });
    html += '</table></div>';
    return html;
  }

  // ===== セクション: 基本情報 =====
  function renderBasicSection() {
    const basicRows = [
      { label: '価格', key: 'price', fmt: v => v ? (v/10000).toLocaleString() + '万円' : '—', edit: 'price' },
      { label: '土地面積', key: 'land_area', fmt: v => v ? (v/3.305785).toFixed(1) + '坪（' + v + '㎡）' : '—', edit: 'area' },
      { label: '坪単価', key: '_tsubo', fmt: (v,p) => p.price && p.land_area ? (p.price/(p.land_area/3.305785)/10000).toFixed(1) + '万円/坪' : '—' },
      { label: '所在地', key: 'address', fmt: v => v || '—', edit: true },
      { label: '駅距離', key: 'station_distance', fmt: v => v || '—', edit: true },
    ];
    let html = '<div style="overflow-x:auto;"><table class="so-comp-t-table">';
    basicRows.forEach(r => {
      html += '<tr><th>' + r.label + '</th>' +
        props.map(p => editTd(p, r.key, r.fmt(p[r.key], p), r.edit)).join('') + '</tr>';
    });
    // 物件ページリンク
    html += '<tr><th>物件ページ</th>' + props.map(p =>
      '<td style="padding:8px 10px;border-bottom:1px solid #f3f4f6;">' +
      (p.url ? '<a href="' + p.url + '" target="_blank" rel="noopener" class="so-comp-prop-link">🔗 物件ページ</a>' : '<span style="color:#d1d5db;">—</span>') +
      '</td>'
    ).join('') + '</tr>';
    html += '</table></div>';
    return html;
  }

  // ===== セクション: 重要確認項目（コンパクト+展開） =====
  function renderCheckSection() {
    const items = [
      { label: '用途地域', key: 'zoning' },
      { label: '建ぺい率/容積率', key: '_cov_far', fmt: p => [p.building_coverage, p.floor_area_ratio].filter(Boolean).join(' / ') || '' },
      { label: '接道', key: 'road_access' },
      { label: '高低差/造成', key: 'elevation' },
      { label: 'インフラ', key: 'infrastructure' },
      { label: 'ハザード', key: 'hazard' },
    ];
    const cols = props.length;
    const visible = items.slice(0, 3);
    const hidden = items.slice(3);
    let html = '<div class="so-comp-cpt-grid">';
    visible.forEach(r => {
      html += '<div class="so-comp-cpt-row" style="--cols:' + cols + '">' +
        '<div class="so-comp-cpt-row-label">' + r.label + '</div>' +
        props.map(p => {
          const val = r.fmt ? r.fmt(p) : p[r.key];
          return '<div class="so-comp-cpt-row-cell so-comp-editable-cell" onclick="startCellEdit(this,\'' + p.id + '\',\'' + (r.key.startsWith('_') ? 'building_coverage' : r.key) + '\',true)">' + (val || '<span style="color:#d97706;">🟡 不明</span>') + '</div>';
        }).join('') + '</div>';
    });
    if (hidden.length > 0) {
      html += '<div class="so-comp-cpt-expand-btn" onclick="toggleCompExpandRows(\'so-comp-check-extra\');this.textContent=this.textContent.includes(\'▼\')?\'▲ 閉じる\':\'▼ 他' + hidden.length + '項目を見る\';">▼ 他' + hidden.length + '項目を見る</div>';
      hidden.forEach(r => {
        html += '<div class="so-comp-cpt-hidden so-comp-check-extra" style="--cols:' + cols + '">' +
          '<div class="so-comp-cpt-row-label">' + r.label + '</div>' +
          props.map(p => {
            const val = r.fmt ? r.fmt(p) : p[r.key];
            const display = val || '<span style="color:#d97706;">🟡 不明</span>';
            const hazardStyle = r.key === 'hazard' && val ? 'color:#dc2626;font-weight:600;font-size:10px;' : '';
            return '<div class="so-comp-cpt-row-cell so-comp-editable-cell" style="' + hazardStyle + '" onclick="startCellEdit(this,\'' + p.id + '\',\'' + r.key + '\',true)">' + (r.key === 'hazard' && !val ? '<span style="color:#16a34a;">記載なし</span>' : display) + '</div>';
          }).join('') + '</div>';
      });
    }
    html += '</div>';
    return html;
  }

  // ===== セクション: 建築費シミュレーション =====
  function renderBuildSection() {
    const buildRows = [
      { label: '最大建築面積', fmt: c => c ? c.maxBuildingArea.toFixed(1) + ' ㎡' : '—' },
      { label: '最大延床面積', fmt: c => c ? c.maxFloorArea.toFixed(1) + ' ㎡（' + c.maxFloorAreaTsubo.toFixed(1) + '坪）' : '—' },
      { label: 'ローコスト', fmt: c => c ? fmtYen(c.costLow) : '—' },
      { label: 'スタンダード', fmt: c => c ? '<strong style="color:#1e40af;">' + fmtYen(c.costStd) + '</strong>' : '—' },
      { label: 'ハイグレード', fmt: c => c ? fmtYen(c.costHigh) : '—' },
      { label: '諸費用(8%)', fmt: c => c ? fmtYen(c.misc) : '—' },
    ];
    let html = '<div style="overflow-x:auto;"><table class="so-comp-t-table">';

    // 最大建築面積・最大延床面積（参考値）
    html += '<tr><th>' + buildRows[0].label + '</th>' + props.map((p,i) => {
      const c = costs[i];
      if (c) return '<td>' + buildRows[0].fmt(c) + '</td>';
      return '<td class="so-comp-editable-cell" onclick="startCellEdit(this,\'' + p.id + '\',\'building_coverage\',true)" title="建蔽率・容積率を入力すると算出"><span style="color:#d1d5db;">—</span> <span style="color:#d1d5db;font-size:10px;">✏️</span></td>';
    }).join('') + '</tr>';

    html += '<tr><th>' + buildRows[1].label + '</th>' + props.map((p,i) => {
      const c = costs[i];
      if (c) return '<td>' + buildRows[1].fmt(c) + '</td>';
      return '<td class="so-comp-editable-cell" onclick="startCellEdit(this,\'' + p.id + '\',\'building_coverage\',true)" title="建蔽率・容積率を入力すると算出"><span style="color:#d1d5db;">—</span> <span style="color:#d1d5db;font-size:10px;">✏️</span></td>';
    }).join('') + '</tr>';

    // 🏠 シミュレーション建坪（編集可能行）
    html += '<tr style="background:#eff6ff;"><th style="color:#1e40af;font-weight:700;">🏠 シミュレーション建坪</th>' + props.map((p,i) => {
      const c = costs[i];
      if (!c) return '<td style="color:#d1d5db;">—</td>';
      const displayTsubo = c.simTsubo.toFixed(1);
      const isCustom = !!c.customTsubo;
      const resetBtn = isCustom ? ' <span onclick="event.stopPropagation();resetCustomTsubo(\'' + p.id + '\')" title="上限に戻す" style="cursor:pointer;font-size:10px;color:#9ca3af;vertical-align:middle;">↩️</span>' : '';
      return '<td class="so-comp-editable-cell" onclick="startCellEdit(this,\'' + p.id + '\',\'custom_floor_tsubo\',\'tsubo\')" style="cursor:pointer;' + (isCustom ? 'color:#1e40af;font-weight:700;' : '') + '">' +
        displayTsubo + '坪 <span style="font-size:10px;color:#9ca3af;">✏️</span>' + resetBtn +
        (isCustom ? '<br><span style="font-size:9px;color:#6b7280;font-weight:400;">変更済</span>' : '') +
        '</td>';
    }).join('') + '</tr>';

    // コスト行（ローコスト〜諸費用）
    buildRows.slice(2).forEach(r => {
      html += '<tr><th>' + r.label + '</th>' + props.map((p,i) => {
        const c = costs[i];
        if (c) return '<td>' + r.fmt(c) + '</td>';
        return '<td class="so-comp-editable-cell" onclick="startCellEdit(this,\'' + p.id + '\',\'building_coverage\',true)" title="建蔽率・容積率を入力すると算出"><span style="color:#d1d5db;">—</span> <span style="color:#d1d5db;font-size:10px;">✏️</span></td>';
      }).join('') + '</tr>';
    });

    // ⚠️ 想定追加費用（土地条件による追加コスト）
    const hasAnyExtra = costs.some(c => c && c.extraCosts.length > 0);
    if (hasAnyExtra) {
      html += '<tr style="background:#fffbeb;"><th style="color:#b45309;font-weight:700;font-size:11px;">⚠️ 想定追加費用</th>' +
        props.map((p,i) => {
          const c = costs[i];
          if (!c) return '<td style="color:#d1d5db;">—</td>';
          if (c.extraCosts.length === 0) return '<td style="color:#9ca3af;font-size:11px;">—</td>';
          const reasons = c.extraCosts.map(e => e.label).join('・');
          return '<td style="color:#b45309;font-weight:700;">' + fmtYen(c.extraCostTotal) +
            '<br><span style="font-size:9px;font-weight:400;color:#92400e;">' + reasons + '</span></td>';
        }).join('') + '</tr>';
    }

    html += '<tr style="border-top:2px solid #fed7aa;background:#fff7ed;"><th style="color:#c2410c;font-weight:700;">💰 総額目安</th>' +
      props.map((p,i) => {
        const c = costs[i];
        if (!c) return '<td style="color:#d1d5db;">—</td>';
        const breakdown = c.extraCostTotal > 0 ? '（土地+建築std+諸費用+追加費用）' : '（土地代+建築費std+諸費用）';
        return '<td style="font-weight:900;color:#c2410c;font-size:13px;">' + fmtYen(c.totalEstimate) + '<br><span style="font-size:10px;font-weight:400;color:#9ca3af;">' + breakdown + '</span></td>';
      }).join('') + '</tr></table></div>';
    return html;
  }

  // ===== セクション: 周辺環境（コンパクト+展開） =====
  function renderEnvSection() {
    const hasEnrich = props.some(p => p.enrichment_status === 'done');
    if (!hasEnrich && !props.some(p => p.lat && p.lng)) return '<div style="padding:14px;font-size:12px;color:#9ca3af;">AI分析後に表示されます</div>';
    const envItems = [
      { label: '小学校区', key: 'school_elementary' },
      { label: '最寄スーパー', key: 'nearest_supermarket' },
      { label: '最寄病院', key: 'nearest_hospital' },
      { label: '中学校区', key: 'school_junior_high' },
      { label: '最寄公園', key: 'nearest_park' },
      { label: '最寄保育園', key: 'nearest_nursery' },
    ];
    const cols = props.length;
    const visible = envItems.slice(0, 3);
    const hidden = envItems.slice(3);

    function envCell(p, key) {
      if (p.enrichment_status === 'done') return p[key] || '<span style="color:#d1d5db;">—</span>';
      if (p.enrichment_status === 'pending') return '<span style="color:#f59e0b;">⏳ 取得中...</span>';
      if (p.lat && p.lng) return '<button onclick="handleEnrichProperty(\'' + p.id + '\')" style="color:#2563eb;font-size:11px;cursor:pointer;background:none;border:none;text-decoration:underline;">🔍 取得する</button>';
      return '<span style="color:#d1d5db;">位置情報なし</span>';
    }

    let html = '<div class="so-comp-cpt-grid">';
    visible.forEach(r => {
      html += '<div class="so-comp-cpt-row" style="--cols:' + cols + '">' +
        '<div class="so-comp-cpt-row-label">' + r.label + '</div>' +
        props.map(p => '<div class="so-comp-cpt-row-cell">' + envCell(p, r.key) + '</div>').join('') + '</div>';
    });
    if (hidden.length > 0) {
      html += '<div class="so-comp-cpt-expand-btn" onclick="toggleCompExpandRows(\'so-comp-env-extra\');this.textContent=this.textContent.includes(\'▼\')?\'▲ 閉じる\':\'▼ 他' + hidden.length + '施設を見る\';">▼ 他' + hidden.length + '施設を見る</div>';
      hidden.forEach(r => {
        html += '<div class="so-comp-cpt-hidden so-comp-env-extra" style="--cols:' + cols + '">' +
          '<div class="so-comp-cpt-row-label">' + r.label + '</div>' +
          props.map(p => '<div class="so-comp-cpt-row-cell">' + envCell(p, r.key) + '</div>').join('') + '</div>';
      });
    }
    html += '</div>';
    return html;
  }

  // ===== セクション: ハザード・地盤 =====
  function renderHazardSection() {
    const hasEnrich = props.some(p => p.enrichment_status === 'done');
    if (!hasEnrich && !props.some(p => p.lat && p.lng)) return '<div style="padding:14px;font-size:12px;color:#9ca3af;">AI分析後に表示されます</div>';
    const hazardItems = [
      { label: '洪水リスク', key: 'hazard_flood' },
      { label: '土砂災害', key: 'hazard_sediment' },
      { label: '津波リスク', key: 'hazard_tsunami' },
      { label: '地盤', key: 'ground_type' },
    ];
    let html = '<div style="overflow-x:auto;"><table class="so-comp-t-table">';
    hazardItems.forEach(r => {
      html += '<tr><th>' + r.label + '</th>' + props.map((p,i) => {
        if (p.enrichment_status === 'done') {
          return '<td>' + compRiskBadgeHtml(p[r.key], 'so-hz-' + r.key + '-' + i) + '</td>';
        } else if (p.enrichment_status === 'pending') {
          return '<td style="color:#f59e0b;font-size:11px;">⏳ 取得中...</td>';
        } else if (p.lat && p.lng) {
          return '<td><button onclick="handleEnrichProperty(\'' + p.id + '\')" style="color:#2563eb;font-size:11px;cursor:pointer;background:none;border:none;text-decoration:underline;">🔍 取得する</button></td>';
        }
        return '<td style="color:#d1d5db;font-size:11px;">位置情報なし</td>';
      }).join('') + '</tr>';
    });
    html += '</table></div>';
    return html;
  }

  // ===== セクション: AIコメント =====
  function renderAICommentSection() {
    if (!props.some(p => p.ai_comment)) return '<div style="padding:14px;font-size:12px;color:#9ca3af;">AIコメントなし</div>';
    let html = '<div style="overflow-x:auto;"><table class="so-comp-t-table"><tr><th>AIコメント</th>';
    html += props.map(p => '<td style="font-size:11px;line-height:1.6;">' + (p.ai_comment || '<span style="color:#d1d5db;">—</span>') + '</td>').join('');
    html += '</tr></table></div>';
    return html;
  }

  // ===== セクション: メモ =====
  function renderMemoSection() {
    let html = '<div style="overflow-x:auto;"><table class="so-comp-t-table"><tr><th>メモ</th>';
    html += props.map(p => '<td style="padding:6px;"><textarea class="so-comp-memo-area" rows="2" placeholder="自由にメモを入力..." onblur="handleMemoEdit(\'' + p.id + '\', this.value)">' + (p.user_memo || p.memo || '') + '</textarea></td>').join('');
    html += '</tr></table></div>';
    return html;
  }

  // ===== メインHTML組み立て =====
  const accSections = [
    accSection('scores', '📊', 'スコア比較', '', true, renderScoreSection()),
    accSection('basic', '📍', '基本情報', '5項目', false, renderBasicSection()),
    accSection('aicomment', '💬', 'AIコメント', '', false, renderAICommentSection()),
    accSection('check', '⚠️', '重要確認項目', '6項目', false, renderCheckSection()),
    accSection('build', '🏗️', '建築費シミュレーション', '総額比較', false, renderBuildSection()),
    accSection('env', '🔍', '周辺環境', '6施設', false, renderEnvSection()),
    accSection('hazard', '🛡️', 'ハザード・地盤', '4項目', false, renderHazardSection()),
    accSection('memo', '📝', 'メモ', '', false, renderMemoSection()),
  ].join('');

  return `
    <div class="space-y-3 fade-in">
      <div class="flex items-center gap-3 flex-wrap">
        <h2 class="text-lg font-bold text-gray-800">📊</h2>
        <span id="comp-name-display" class="text-lg font-bold text-gray-800 cursor-pointer hover:text-blue-600 border-b border-dashed border-gray-300" onclick="startCompNameEdit()" title="クリックして名前を変更">${comp.name || '比較表'}</span>
        <span class="text-xs text-gray-400">（カードクリックで詳細表示）</span>
        <button onclick="exportComparisonCSV()" class="ml-auto px-3 py-1 text-xs rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">📥 CSV出力</button>
      </div>

      ${comp.summary ? `
        <div style="padding:14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;">
          <div style="font-size:12px;font-weight:700;color:#1d4ed8;margin-bottom:4px;">💡 AIサマリ</div>
          <div style="font-size:13px;color:#374151;line-height:1.7;">${comp.summary}</div>
        </div>
      ` : ''}

      ${comp._unsaved ? `
        <div style="background:linear-gradient(135deg, #1E40AF 0%, #2563EB 50%, #3B82F6 100%); border-radius:20px; padding:28px 24px; position:relative; overflow:hidden; box-shadow:0 8px 32px rgba(37,99,235,0.3);">
          <div style="position:absolute; top:-40px; right:-40px; width:140px; height:140px; background:rgba(255,255,255,0.08); border-radius:50%;"></div>
          <div style="position:absolute; bottom:-30px; left:-10px; width:100px; height:100px; background:rgba(255,255,255,0.05); border-radius:50%;"></div>
          <div style="position:relative; z-index:1;">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px;">
              <div style="width:36px; height:36px; background:rgba(255,255,255,0.2); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px;">🔒</div>
              <div style="font-size:17px; font-weight:800; color:white;">この比較表を保存しませんか？</div>
            </div>
            <p style="font-size:13px; color:rgba(255,255,255,0.85); margin-bottom:18px; line-height:1.7;">
              無料ユーザー登録で、比較表の保存やパーソナライズ機能が使えます。
            </p>
            <div style="display:flex; flex-direction:column; gap:14px; margin-bottom:22px;">
              <div style="display:flex; align-items:flex-start; gap:10px;">
                <span style="font-size:18px; flex-shrink:0;">📊</span>
                <div>
                  <div style="font-size:14px; font-weight:700; color:white;">比較表を永久保存</div>
                  <div style="font-size:12px; color:rgba(255,255,255,0.7); margin-top:2px;">次回アクセス時もすぐに確認できます</div>
                </div>
              </div>
              <div style="display:flex; align-items:flex-start; gap:10px;">
                <span style="font-size:18px; flex-shrink:0;">🏡</span>
                <div>
                  <div style="font-size:14px; font-weight:700; color:white;">ライフスタイルスコア</div>
                  <div style="font-size:12px; color:rgba(255,255,255,0.7); margin-top:2px;">勤務先や重視条件を登録して、あなた好みのスコアで比較</div>
                </div>
              </div>
              <div style="display:flex; align-items:flex-start; gap:10px;">
                <span style="font-size:18px; flex-shrink:0;">📱</span>
                <div>
                  <div style="font-size:14px; font-weight:700; color:white;">どの端末からでもアクセス</div>
                  <div style="font-size:12px; color:rgba(255,255,255,0.7); margin-top:2px;">スマホ・PC・タブレットで同じデータを閲覧</div>
                </div>
              </div>
            </div>
            <button onclick="openAuthModal(); state._pendingSaveCompId='${comp.id}';" style="display:block; width:100%; padding:14px 24px; background:white; color:#1E40AF; border:none; border-radius:12px; font-size:15px; font-weight:800; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,0.15); transition:all 0.2s; text-align:center;" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 6px 20px rgba(0,0,0,0.2)'" onmouseout="this.style.transform='none';this.style.boxShadow='0 4px 14px rgba(0,0,0,0.15)'">
              無料ユーザー登録（メールアドレスのみ）
            </button>
            <div style="font-size:11px; color:rgba(255,255,255,0.6); margin-top:10px; text-align:center;">
              ※ パスワード不要。メールアドレスだけで30秒で登録完了
            </div>
          </div>
        </div>
      ` : ''}

      ${summaryCards}
      ${accSections}

      ${questions.length > 0 ? `
        <div class="card" style="padding:14px;">
          <h3 style="font-size:13px;font-weight:700;margin-bottom:8px;">📋 確認質問テンプレート</h3>
          <div class="space-y-2">
            ${questions.map((q,i) => `
              <label class="flex items-start gap-2 text-sm text-gray-700">
                <input type="checkbox" class="mt-1 so-question-check" />
                <span>${typeof q === 'object' ? q.text || q.question || JSON.stringify(q) : q}</span>
              </label>
            `).join('')}
          </div>
          <button onclick="copyQuestions()" class="mt-3 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200 transition-colors">📋 質問をコピー</button>
        </div>
      ` : ''}
    </div>

    <!-- 物件詳細モーダル -->
    <div class="so-comp-modal-overlay" id="so-comp-prop-modal" onclick="if(event.target===this) closePropertyDetailModal();">
      <div class="so-comp-modal-box" id="so-comp-prop-modal-body" onclick="event.stopPropagation()"></div>
    </div>
  `;
}

// ===== 比較表ハイブリッドUI ヘルパー関数 =====
function toggleCompAccordion(id) {
  document.getElementById(id)?.classList.toggle('open');
}
function toggleCompHzDetail(id) {
  document.getElementById(id)?.classList.toggle('open');
}
function toggleCompExpandRows(cls) {
  document.querySelectorAll('.' + cls).forEach(e => e.classList.toggle('open'));
}
function openPropertyDetailModal(index) {
  const comp = state.soComparison;
  if (!comp) return;
  const props = comp.properties || [];
  if (index < 0 || index >= props.length) return;
  const p = props[index];
  const labels = ['A','B','C','D','E'];
  const COLORS = ['#2563eb','#16a34a','#9333ea','#f59e0b','#ef4444'];
  const s = calculateScores(p, state.userProfile);
  const allScores = props.map(pp => calculateScores(pp, state.userProfile));
  const maxTotal = Math.max(...allScores.map(ss => ss ? ss.score_total : 0));
  const isBest = s && s.score_total === maxTotal && maxTotal > 0;
  const cost = calcBuildingCost(p);
  const fmtYen = v => v >= 100000000 ? (v/100000000).toFixed(2) + '億円' : Math.round(v/10000).toLocaleString() + '万円';
  function sc(v) { return v >= 80 ? '#16a34a' : v >= 60 ? '#2563eb' : v >= 40 ? '#f59e0b' : '#dc2626'; }
  function mRiskLevel(text) {
    if (!text) return 'unknown';
    const first = text.split(/[。（(]/)[0].trim();
    if (/^高/.test(first)) return 'high'; if (/^中/.test(first)) return 'mid'; if (/^低/.test(first)) return 'low';
    if (first.includes('高')) return 'high'; if (first.includes('中')) return 'mid'; return 'low';
  }

  const areaName = AREAS.find(a=>a.id===p.area_id)?.name || (p.address ? AREAS.find(a=>p.address.includes(a.name))?.name : '') || '';
  const priceStr = p.price ? (p.price/10000).toLocaleString() + '万円' : '—';
  const tsubo = p.land_area ? (p.land_area / 3.305785).toFixed(1) : '';
  const tsuboPrice = p.price && p.land_area ? (p.price/(p.land_area/3.305785)/10000).toFixed(1) + '万/坪' : '';

  const body = document.getElementById('so-comp-prop-modal-body');
  let html = '';
  // ヘッダー
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
    '<div style="display:flex;align-items:center;gap:10px;">' +
    '<div class="so-comp-label-chip" style="background:' + COLORS[index] + ';width:36px;height:36px;font-size:16px;">' + labels[index] + '</div>' +
    '<div><div style="font-size:16px;font-weight:700;">' + (p.address || '物件' + labels[index]) + '</div>' +
    '<div style="font-size:11px;color:#6b7280;">' + [areaName, p.station_distance].filter(Boolean).join(' | ') + '</div></div></div>' +
    '<button class="so-comp-modal-close" onclick="closePropertyDetailModal()">&times;</button></div>';

  // 物件ページリンク
  if (p.url) {
    html += '<div style="margin-bottom:12px;"><a href="' + p.url + '" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:4px;padding:5px 14px;background:#eff6ff;color:#2563eb;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;border:1px solid #bfdbfe;">🔗 物件ページを見る</a></div>';
  }

  // スコア
  if (s) {
    html += '<div style="text-align:center;margin-bottom:12px;">' +
      '<div style="font-size:40px;font-weight:900;color:' + sc(s.score_total) + ';">' + s.score_total + '<span style="font-size:14px;font-weight:400;color:#9ca3af;">/100</span></div>' +
      (isBest ? '<div style="margin-top:2px;"><span style="display:inline-block;padding:2px 10px;background:#dcfce7;color:#15803d;border-radius:999px;font-size:11px;font-weight:600;">👑 総合1位</span></div>' : '') + '</div>';
    const scoreItems = [['🛡️ 安全', s.score_safety], ['🏪 利便', s.score_convenience], ['💰 コスト', s.score_cost]];
    if (s.score_lifestyle !== null) scoreItems.push(['🏡 ライフ', s.score_lifestyle]);
    scoreItems.forEach(([l,v]) => {
      if (v == null) return;
      html += '<div class="so-comp-m-score-row"><span class="so-comp-m-score-label">' + l + '</span>' +
        '<div class="so-comp-m-score-bar"><div class="so-comp-m-score-fill" style="width:' + v + '%;background:' + sc(v) + ';"></div></div>' +
        '<span class="so-comp-m-score-val" style="color:' + sc(v) + ';">' + v + '</span></div>';
    });
  }

  // 基本情報
  html += '<div class="so-comp-info-grid" style="margin-top:12px;">' +
    '<div class="so-comp-info-cell"><div class="so-comp-info-cell-label">価格</div><div class="so-comp-info-cell-value" style="color:#1e40af;">' + priceStr + '</div></div>' +
    '<div class="so-comp-info-cell"><div class="so-comp-info-cell-label">土地面積</div><div class="so-comp-info-cell-value">' + (tsubo ? tsubo + '坪' + (p.land_area ? '（' + p.land_area + '㎡）' : '') : '—') + '</div></div>' +
    '<div class="so-comp-info-cell"><div class="so-comp-info-cell-label">坪単価</div><div class="so-comp-info-cell-value">' + (tsuboPrice || '—') + '</div></div>' +
    '<div class="so-comp-info-cell"><div class="so-comp-info-cell-label">駅距離</div><div class="so-comp-info-cell-value">' + (p.station_distance || '—') + '</div></div></div>';

  // 重要確認項目
  html += '<div style="margin-top:14px;"><div style="font-size:12px;font-weight:700;color:#b45309;margin-bottom:6px;">⚠️ 重要確認項目</div><div class="so-comp-info-grid">';
  [['用途地域', p.zoning], ['建ぺい率/容積率', [p.building_coverage, p.floor_area_ratio].filter(Boolean).join(' / ')], ['接道', p.road_access], ['高低差/造成', p.elevation || '不明'], ['インフラ', p.infrastructure], ['ハザード(物件情報)', p.hazard || '記載なし']].forEach(([l,v]) => {
    html += '<div class="so-comp-info-cell"><div class="so-comp-info-cell-label">' + l + '</div><div class="so-comp-info-cell-value" style="font-size:11px;">' + (v || '—') + '</div></div>';
  });
  html += '</div></div>';

  // ハザード判定詳細
  if (p.enrichment_status === 'done') {
    html += '<div class="so-comp-fold-header" onclick="toggleCompModalFold(\'so-comp-modal-hz-' + index + '\')"><h4>🛡️ ハザード判定詳細</h4><span style="font-size:10px;color:#9ca3af;">▼</span></div>' +
      '<div class="so-comp-fold-body" id="so-comp-modal-hz-' + index + '">';
    [['洪水リスク', p.hazard_flood], ['土砂災害', p.hazard_sediment], ['津波リスク', p.hazard_tsunami], ['地盤', p.ground_type]].forEach(([l,v]) => {
      const rl = mRiskLevel(v);
      const borderColor = rl === 'high' ? '#dc2626' : rl === 'mid' ? '#f59e0b' : '#16a34a';
      html += '<div style="margin-bottom:8px;"><div style="font-size:11px;font-weight:600;color:#475569;margin-bottom:2px;">' + l + '</div>' +
        '<div style="font-size:11px;color:#64748b;line-height:1.6;padding:6px 8px;background:#f8fafc;border-radius:6px;border-left:3px solid ' + borderColor + ';">' + (v || '情報なし') + '</div></div>';
    });
    html += '</div>';
  }

  // 建築費
  if (cost) {
    const isCustom = !!cost.customTsubo;
    html += '<div class="so-comp-fold-header" onclick="toggleCompModalFold(\'so-comp-modal-build-' + index + '\')"><h4>🏗️ 建築費シミュレーション</h4><span style="font-size:10px;color:#9ca3af;">▼</span></div>' +
      '<div class="so-comp-fold-body" id="so-comp-modal-build-' + index + '">' +
      '<div style="margin-bottom:8px;padding:8px 10px;background:#eff6ff;border-radius:8px;text-align:center;">' +
      '<div style="font-size:10px;color:#6b7280;">🏠 シミュレーション建坪</div>' +
      '<div style="font-size:18px;font-weight:700;color:#1e40af;">' + cost.simTsubo.toFixed(1) + '坪</div>' +
      (isCustom ? '<div style="font-size:9px;color:#6b7280;">変更済（上限: ' + cost.maxFloorAreaTsubo.toFixed(1) + '坪）</div>' : '<div style="font-size:9px;color:#9ca3af;">上限値（比較表で変更可能）</div>') +
      '</div>' +
      '<div class="so-comp-info-grid" style="grid-template-columns:1fr 1fr 1fr;">' +
      '<div class="so-comp-info-cell" style="text-align:center;"><div class="so-comp-info-cell-label">ローコスト</div><div class="so-comp-info-cell-value">' + fmtYen(cost.costLow) + '</div></div>' +
      '<div class="so-comp-info-cell" style="text-align:center;"><div class="so-comp-info-cell-label">スタンダード</div><div class="so-comp-info-cell-value" style="color:#1e40af;">' + fmtYen(cost.costStd) + '</div></div>' +
      '<div class="so-comp-info-cell" style="text-align:center;"><div class="so-comp-info-cell-label">ハイグレード</div><div class="so-comp-info-cell-value">' + fmtYen(cost.costHigh) + '</div></div></div>' +
      (cost.extraCosts.length > 0 ?
        '<div style="margin-top:8px;padding:8px 10px;background:#fffbeb;border-radius:8px;border-left:3px solid #f59e0b;">' +
        '<div style="font-size:10px;font-weight:700;color:#b45309;">⚠️ 想定追加費用 ' + fmtYen(cost.extraCostTotal) + '</div>' +
        '<div style="font-size:9px;color:#92400e;margin-top:2px;">' + cost.extraCosts.map(e => e.label).join('・') + '</div></div>'
      : '') +
      '<div style="margin-top:8px;padding:10px;background:#fff7ed;border-radius:8px;text-align:center;">' +
      '<div style="font-size:10px;color:#9ca3af;">💰 総額目安</div>' +
      '<div style="font-size:20px;font-weight:900;color:#c2410c;">' + fmtYen(cost.totalEstimate) + '</div>' +
      (cost.extraCostTotal > 0 ? '<div style="font-size:9px;color:#9ca3af;">追加費用含む</div>' : '') +
      '</div></div>';
  }

  // 周辺環境
  if (p.enrichment_status === 'done') {
    html += '<div class="so-comp-fold-header" onclick="toggleCompModalFold(\'so-comp-modal-env-' + index + '\')"><h4>🔍 周辺環境</h4><span style="font-size:10px;color:#9ca3af;">▼</span></div>' +
      '<div class="so-comp-fold-body" id="so-comp-modal-env-' + index + '">';
    [['小学校区', p.school_elementary], ['中学校区', p.school_junior_high], ['スーパー', p.nearest_supermarket], ['病院', p.nearest_hospital], ['公園', p.nearest_park], ['保育園', p.nearest_nursery]].forEach(([l,v]) => {
      html += '<div class="so-comp-kv-row"><span class="so-comp-kv-label">' + l + '</span><span class="so-comp-kv-value">' + (v || '—') + '</span></div>';
    });
    html += '</div>';
  }

  // AIコメント
  if (p.ai_comment) {
    html += '<div style="margin-top:12px;padding:10px;background:#f0fdf4;border-radius:8px;">' +
      '<div style="font-size:11px;font-weight:700;color:#15803d;margin-bottom:3px;">💬 AIコメント</div>' +
      '<div style="font-size:12px;color:#374151;">' + p.ai_comment + '</div></div>';
  }

  // メモ

function copyQuestions() {
  const checks = document.querySelectorAll('.so-question-check');
  const texts = [];
  checks.forEach((cb, i) => {
    const label = cb.parentElement?.querySelector('span')?.textContent;
    if (label) texts.push(`${cb.checked ? '✅' : '□'} ${label}`);
  });
  if (texts.length === 0) return;
  navigator.clipboard.writeText(texts.join('\n')).then(() => alert('質問をクリップボードにコピーしました'));
}

async function finishCompNameEdit(newName) {

// セル編集: クリック → inline input
function startCellEdit(td, propId, key, editType) {
  if (td.querySelector('input,textarea')) return; // 既に編集中
  const prop = state.savedProperties.find(p => p.id === propId);
  if (!prop) return;

  const currentVal = prop[key];
  td.innerHTML = '';

  if (editType === 'tsubo') {
    // 坪数入力
    const input = document.createElement('input');
    input.type = 'number';
    input.step = '0.1';
    input.className = 'w-full px-2 py-1 border border-blue-300 rounded text-sm focus:ring-2 focus:ring-blue-200 outline-none';
    input.value = currentVal || '';
    input.placeholder = '坪';
    input.onblur = () => finishCellEdit(propId, key, input.value ? Number(input.value) : null);
    input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { render(); } };
    td.appendChild(input);
    setTimeout(() => input.focus(), 0);
  } else if (editType === 'price') {
    // 万円 → 円で保存されているので万円で表示・入力
    const input = document.createElement('input');
    input.type = 'number';
    input.className = 'w-full px-2 py-1 border border-blue-300 rounded text-sm focus:ring-2 focus:ring-blue-200 outline-none';
    input.value = currentVal ? currentVal / 10000 : '';
    input.placeholder = '万円';
    input.focus();
    input.onblur = () => finishCellEdit(propId, key, input.value ? Number(input.value) * 10000 : null);
    input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { render(); } };
    td.appendChild(input);
    setTimeout(() => input.focus(), 0);
  } else if (editType === 'area') {
    // ㎡で保存
    const input = document.createElement('input');
    input.type = 'number';
    input.step = '0.1';
    input.className = 'w-full px-2 py-1 border border-blue-300 rounded text-sm focus:ring-2 focus:ring-blue-200 outline-none';
    input.value = currentVal || '';
    input.placeholder = '㎡';
    input.onblur = () => finishCellEdit(propId, key, input.value ? Number(input.value) : null);
    input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { render(); } };
    td.appendChild(input);
    setTimeout(() => input.focus(), 0);
  } else {
    // テキスト入力
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'w-full px-2 py-1 border border-blue-300 rounded text-sm focus:ring-2 focus:ring-blue-200 outline-none';
    input.value = currentVal || '';
    input.onblur = () => finishCellEdit(propId, key, input.value.trim() || null);
    input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { render(); } };
    td.appendChild(input);
    setTimeout(() => input.focus(), 0);
  }
}

async function finishCellEdit(propId, key, newVal) {
  const prop = state.savedProperties.find(p => p.id === propId);
  if (!prop) return;
  if (prop[key] === newVal) { render(); return; }
  // comparison内のpropsも同期
  if (state.soComparison?.properties) {
    const cp = state.soComparison.properties.find(p => p.id === propId);
    if (cp) cp[key] = newVal;
  }
  await updateProperty(propId, { [key]: newVal });
  render();
}

async function resetCustomTsubo(propId) {
  await finishCellEdit(propId, 'custom_floor_tsubo', null);
}

async function handleMemoEdit(propId, value) {
  const trimmed = value.trim();
  const prop = state.savedProperties.find(p => p.id === propId);
  if (!prop) return;
  if ((prop.user_memo || '') === trimmed) return;
  if (state.soComparison?.properties) {
    const cp = state.soComparison.properties.find(p => p.id === propId);
    if (cp) cp.user_memo = trimmed;
  }
  await updateProperty(propId, { user_memo: trimmed });
}

const importTips = [
  { icon: '💡', text: '建ぺい率と容積率で建てられる家の大きさが決まります' },
  { icon: '🏫', text: '小学校区は資産価値にも影響する重要ポイントです' },

  { icon: '📐', text: '同じ面積でも間口と奥行きの比率で使い勝手が大きく変わります' },

  { icon: '🏠', text: '建築費シミュレーションで建坪を変更して試算できます' },
  { icon: '⚠️', text: '高低差のある土地は造成費で100〜300万円かかることがあります' },
];
const importSteps = [
  { icon: '🌐', label: '物件ページを取得中...' },
  { icon: '🤖', label: 'AIが情報を解析中...' },
  { icon: '📋', label: 'データを整理中...' },
];
let _tipTimer = null;
let _stepTimer = null;
let _elapsedTimer = null;

function startImportTimers() {
  stopImportTimers();
  state._batchStartTime = Date.now();
  state._batchStepIndex = 0;
  state._tipIndex = Math.floor(Math.random() * importTips.length);

  // Tips: 5秒ごとにDOM直接更新
  _tipTimer = setInterval(() => {
    state._tipIndex = (state._tipIndex + 1) % importTips.length;
    const tipEl = document.getElementById('import-tip-content');
    if (tipEl) {
      const tip = importTips[state._tipIndex];
      tipEl.innerHTML = '<span style="font-size:16px;margin-right:6px;">' + tip.icon + '</span>' + tip.text;
      tipEl.classList.remove('tip-fade');
      void tipEl.offsetWidth;
      tipEl.classList.add('tip-fade');
    }
  }, 5000);

  // ステップ: 3秒ごとに自動進行
  _stepTimer = setInterval(() => {
    if (state._batchStepIndex < importSteps.length - 1) {
      state._batchStepIndex++;
      const stepsEl = document.getElementById('import-steps');
      if (stepsEl) updateStepDisplay(stepsEl);
    }
  }, 3000);

  // 経過時間: 1秒ごとに更新
  _elapsedTimer = setInterval(() => {
    const el = document.getElementById('import-elapsed');
    if (el && state._batchStartTime) {
      const sec = Math.floor((Date.now() - state._batchStartTime) / 1000);
      el.textContent = Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
    }
  }, 1000);
}

function stopImportTimers() {
  if (_tipTimer) { clearInterval(_tipTimer); _tipTimer = null; }
  if (_stepTimer) { clearInterval(_stepTimer); _stepTimer = null; }
  if (_elapsedTimer) { clearInterval(_elapsedTimer); _elapsedTimer = null; }
}

function resetStepIndex() {
  state._batchStepIndex = 0;
  const stepsEl = document.getElementById('import-steps');
  if (stepsEl) updateStepDisplay(stepsEl);
}

function updateStepDisplay(container) {
  const idx = state._batchStepIndex || 0;
  container.innerHTML = importSteps.map((s, i) => {
    const cls = i < idx ? 'step-done' : i === idx ? 'step-active' : 'step-pending';
    const bullet = i < idx ? '✓' : i === idx ? '●' : '○';
    const pulse = i === idx ? ' animate-pulse' : '';
    return '<div class="' + cls + pulse + '" style="font-size:11px;line-height:1.8;">' + bullet + ' ' + s.icon + ' ' + s.label + '</div>';
  }).join('');
}

// 一括取り込みの進捗表示
function renderBatchProgress() {
  const batch = state._batchResults;
  const processing = state._batchProcessing;
  const currentIdx = state._batchCurrentIndex;
  const total = batch.length;
  const doneCount = batch.filter(b => b.status === 'done' || b.status === 'error').length;
  const successCount = batch.filter(b => b.status === 'done').length;
  const errorCount = batch.filter(b => b.status === 'error').length;
  const savedCount = batch.filter(b => b.saved).length;

  // 全完了したか
  const allDone = !processing && doneCount === total;

  return `
    <div class="space-y-3">
      <!-- プログレスバー -->
      <div>
        <div class="flex items-center justify-between text-sm mb-1">
          <span class="font-medium text-gray-700">${processing ? `⏳ 取得中... (${doneCount}/${total})` : allDone ? `✅ 取得完了 (${successCount}件成功${errorCount > 0 ? '、' + errorCount + '件失敗' : ''})` : ''}</span>
          <span class="text-xs text-gray-400">
            ${processing ? `<span id="import-elapsed">0:00</span>` : ''}
            ${allDone ? `<button onclick="resetBatch()" class="text-xs text-gray-400 hover:text-gray-600">✕ 閉じる</button>` : ''}
          </span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2">
          <div class="bg-blue-600 h-2 rounded-full transition-all duration-500" style="width: ${total > 0 ? (doneCount / total * 100) : 0}%"></div>
        </div>
      </div>

      ${processing ? `
      <!-- Tips（処理中のみ表示） -->
      <div style="padding:10px 14px;background:linear-gradient(135deg,#eff6ff,#f0f4ff);border-radius:10px;border:1px solid #dbeafe;">
        <div style="font-size:10px;color:#6b7280;margin-bottom:4px;">💡 知っていますか？</div>
        <div id="import-tip-content" class="tip-fade" style="font-size:12px;color:#1e40af;line-height:1.5;">
          <span style="font-size:16px;margin-right:6px;">${importTips[state._tipIndex || 0].icon}</span>${importTips[state._tipIndex || 0].text}
        </div>
      </div>
      ` : ''}

      <!-- 各URL結果一覧 -->
      <div class="space-y-2 max-h-96 overflow-y-auto">
        ${batch.map((item, idx) => {
          const isProcessing = processing && idx === currentIdx;
          const isDone = item.status === 'done';
          const isError = item.status === 'error';
          const isSaved = item.saved;

          // URL短縮表示
          let shortUrl = item.url;
          try { shortUrl = new URL(item.url).hostname + new URL(item.url).pathname.substring(0, 30) + '...'; } catch(e) {}

          return `
            <div class="border rounded-lg ${isDone ? (isSaved ? 'border-green-300 bg-green-50/50' : 'border-blue-200 bg-blue-50/30') : isError ? 'border-red-200 bg-red-50/30' : isProcessing ? 'border-amber-200 bg-amber-50/30' : 'border-gray-200'} p-3">
              <div class="flex items-center gap-2">
                <span class="text-sm">${isProcessing ? '⏳' : isDone ? (isSaved ? '✅' : '📋') : isError ? '❌' : '⏸️'}</span>
                <span class="text-xs text-gray-500 truncate flex-1" title="${item.url}">${shortUrl}</span>
                ${isProcessing ? '<span class="text-xs text-amber-600 animate-pulse">AI解析中...</span>' : ''}
              </div>

              ${isProcessing ? `
                <div id="import-steps" style="margin-top:6px;padding-left:24px;">
                  ${importSteps.map((s, si) => {
                    const cls = si < (state._batchStepIndex||0) ? 'step-done' : si === (state._batchStepIndex||0) ? 'step-active' : 'step-pending';
                    const bullet = si < (state._batchStepIndex||0) ? '✓' : si === (state._batchStepIndex||0) ? '●' : '○';
                    const pulse = si === (state._batchStepIndex||0) ? ' animate-pulse' : '';
                    return '<div class="' + cls + pulse + '" style="font-size:11px;line-height:1.8;">' + bullet + ' ' + s.icon + ' ' + s.label + '</div>';
                  }).join('')}
                </div>
              ` : ''}

              ${isDone && item.parsed ? `
                <div class="mt-2 pl-6">
                  <div class="grid grid-cols-2 gap-x-3 gap-y-0.5 text-xs">
                    <span class="text-gray-400">価格:</span><span class="font-medium">${item.parsed.price ? item.parsed.price.toLocaleString() + '万円' : '—'}</span>
                    <span class="text-gray-400">面積:</span><span class="font-medium">${item.parsed.land_area ? (item.parsed.land_area/3.305785).toFixed(1) + '坪' : '—'}</span>
                    <span class="text-gray-400">住所:</span><span class="font-medium col-span-1 truncate">${item.parsed.address || '—'}</span>
                  </div>
                  ${renderDupWarning(item.parsed)}
                  ${!isSaved ? `
                    <div class="flex gap-2 mt-2">
                      <button onclick="handleSaveBatchItem(${idx})" class="px-3 py-1 bg-green-600 text-white rounded text-xs font-medium hover:bg-green-700 transition-colors">💾 保存</button>
                      <button onclick="skipBatchItem(${idx})" class="px-3 py-1 bg-gray-100 text-gray-500 rounded text-xs hover:bg-gray-200 transition-colors">スキップ</button>
                    </div>
                  ` : `<p class="text-xs text-green-600 mt-1">✅ 保存済み</p>`}
                </div>
              ` : ''}

              ${isError ? `<p class="text-xs text-red-500 mt-1 pl-6">${item.error || '取得失敗'}</p>` : ''}

      ${allDone && successCount > 0 ? `
        <div class="flex gap-2">

function openImportModal(areaId) {
  const urlInput = document.getElementById('url-import-property') || document.getElementById('url-import-detail');
  const initialUrl = urlInput ? urlInput.value.trim() : '';
  state._importUrl = initialUrl;
  state._aiParsedProperty = null;
  state._batchUrls = initialUrl ? [initialUrl] : [''];
  state._batchResults = [];
  state._batchProcessing = false;
  state._batchCurrentIndex = -1;
  state.soSearchAreaId = areaId || null;
  state.soModalOpen = true;
  state.soModalType = 'import';
  render();
}

function closeSOModal(event) {
  if (event.target === event.currentTarget) {
    closeBatchModal();
  }
}

// ============================================================
// 一括URL取り込み: URL入力欄の管理
// ============================================================
function addBatchUrlField() {
  state._batchUrls.push('');
  render();
  // 追加後に最後の入力欄にフォーカス
  setTimeout(() => {
    const inputs = document.querySelectorAll('.batch-url-input');
    if (inputs.length > 0) inputs[inputs.length - 1].focus();
  }, 50);
}

function removeBatchUrlField(idx) {
  if (state._batchUrls.length <= 1) return;
  state._batchUrls.splice(idx, 1);
  render();
}

function updateBatchUrlValue(idx, value) {
  state._batchUrls[idx] = value;
  // ボタンの件数表示を更新（renderしない＝入力中のフォーカスを保持）
  const btn = document.getElementById('btn-fetch-url');
  if (btn) {
    const count = state._batchUrls.filter(u => u && u.trim().startsWith('http')).length;
    btn.textContent = count > 1
      ? `🔗 URLから物件情報を取得（${count}件）`
      : '🔗 URLから物件情報を取得';
  }
}

async function fetchSingleUrl(url) {
  const headers = { 'Content-Type': 'application/json', 'apikey': CONFIG.SUPABASE_ANON_KEY };
  const session = await supabaseClient.auth.getSession();
  const token = session?.data?.session?.access_token;
  if (token) headers['Authorization'] = `Bearer ${token}`;
  else headers['Authorization'] = `Bearer ${CONFIG.SUPABASE_ANON_KEY}`;
  const res = await fetch(`${CONFIG.SUPABASE_URL}/functions/v1/ai-assist`, {
    method: 'POST', headers,
    body: JSON.stringify({ action: 'fetch_url', url, areaId: state.soSearchAreaId })
  });
  if (!res.ok) { const errText = await res.text(); throw new Error(`HTTP ${res.status}: ${errText}`); }
  const result = await res.json();
  if (result.error) throw new Error(result.error);
  return result;
}

async function handleBatchFetchUrls() {
  // 入力欄からURL一覧を取得
  const urls = state._batchUrls
    .map(u => (u || '').trim())
    .filter(u => u.startsWith('http'));

  if (urls.length === 0) { alert('物件ページのURLを入力してください'); return; }

  // 一括フローに入る
  state._batchResults = urls.map(url => ({ url, status: 'pending', parsed: null, error: null, saved: false }));
  state._batchProcessing = true;
  state._batchCurrentIndex = 0;
  state._aiParsedProperty = null;
  render();
  startImportTimers();

  // 順次処理（Edge Function 25秒制限対策 + Jina APIレート制限対策）
  for (let i = 0; i < urls.length; i++) {
    state._batchCurrentIndex = i;
    state._batchResults[i].status = 'processing';
    resetStepIndex();
    render();

    try {
      const result = await fetchSingleUrl(urls[i]);
      state._batchResults[i].status = 'done';
      state._batchResults[i].parsed = result;
    } catch(e) {
      console.error(`URL Fetch error [${i}]:`, e);
      state._batchResults[i].status = 'error';
      state._batchResults[i].error = e.message;
    }
    render();

    // 次のリクエストまで少し待つ（レートリミット対策）
    if (i < urls.length - 1) {
      await new Promise(r => setTimeout(r, 1000));
    }
  }

  stopImportTimers();
  state._batchProcessing = false;
  state._batchCurrentIndex = -1;
  render();
}

// 個別保存
async function handleSaveBatchItem(idx) {
  const item = state._batchResults[idx];
  if (!item || !item.parsed || item.saved) return;
  const parsed = item.parsed;

  if (!parsed.price || !parsed.land_area) {
    alert('価格と面積が必要です。この物件はスキップしてください。');
    return;
  }

  const prop = buildPropertyFromParsed(parsed);
  const saved = await saveProperty(prop);
  if (saved) {
    state._batchResults[idx].saved = true;
    render();
  }
}

// 一括保存（未保存の成功分すべて）
async function handleSaveBatchAll() {
  const unsaved = state._batchResults.filter(b => b.status === 'done' && !b.saved && b.parsed);
  let savedCount = 0;
  for (const item of unsaved) {
    if (!item.parsed.price || !item.parsed.land_area) continue;
    // 重複チェック
    if (item.parsed.dedup_hash) {
      const dup = state.savedProperties.find(p => p.dedup_hash === item.parsed.dedup_hash);
      if (dup) continue; // 重複はスキップ
    }
    const prop = buildPropertyFromParsed(item.parsed);
    const saved = await saveProperty(prop);
    if (saved) {
      item.saved = true;
      savedCount++;
    }
  }
  render();
  if (savedCount > 0) {
    // 少し待ってから閉じない（ユーザーに結果を見せる）
  }
}

// スキップ
function skipBatchItem(idx) {
  state._batchResults[idx].saved = true; // saved=trueにしてUIから消す
  state._batchResults[idx].status = 'skipped';
  render();
}

// バッチリセット（URL入力に戻す）
function resetBatch() {
  state._batchUrls = [''];
  state._batchResults = [];
  state._batchProcessing = false;
  state._batchCurrentIndex = -1;
  render();
}

function closeBatchModal() {
  state.soModalOpen = false;
  state._aiParsedProperty = null;
  state._batchUrls = [''];
  state._batchResults = [];
  state._batchProcessing = false;
  state._batchCurrentIndex = -1;
  render();
}

// parsed → property オブジェクト変換（共通）
function buildPropertyFromParsed(parsed) {
  return {
    area_id: state.soSearchAreaId || null,
    url: parsed.source_url || state._importUrl || null,
    source: parsed.source || null,
    price: parsed.price * 10000, // 万円 → 円
    land_area: parsed.land_area,
    address: parsed.address || null,
    station_distance: parsed.station_distance || null,
    floor_plan: parsed.floor_plan || null,
    building_year: parsed.building_year || null,
    zoning: parsed.zoning || null,
    building_coverage: parsed.building_coverage || null,
    floor_area_ratio: parsed.floor_area_ratio || null,
    road_access: parsed.road_access || null,
    elevation: parsed.elevation || null,
    infrastructure: parsed.infrastructure || null,
    hazard: parsed.hazard || null,
    memo: parsed.memo || null,
    lat: parsed.lat || null,
    lng: parsed.lng || null,
    geo_confidence: parsed.geo_confidence || null,
    geo_source: parsed.geo_source || null,
    dedup_hash: parsed.dedup_hash || null,
  };
}

async function handleFetchUrl() {
  // 一括フローにリダイレクト
  handleBatchFetchUrls();
}

// テキスト貼り付け → AI解析
async function handleAIParse() {
  const textEl = document.getElementById('ai-import-text');
  const urlEl = document.getElementById('import-url-text');
  const text = textEl ? textEl.value.trim() : '';
  const url = urlEl ? urlEl.value.trim() : '';
  if (!text) { alert('物件情報を貼り付けてください'); return; }

  const btn = document.getElementById('btn-ai-parse');
  if (btn) { btn.textContent = '🤖 AIが解析中...'; btn.disabled = true; }

  try {
    const headers = { 'Content-Type': 'application/json', 'apikey': CONFIG.SUPABASE_ANON_KEY };
    const session = await supabaseClient.auth.getSession();
    const token = session?.data?.session?.access_token;
    if (token) headers['Authorization'] = `Bearer ${token}`;
    else headers['Authorization'] = `Bearer ${CONFIG.SUPABASE_ANON_KEY}`;
    const res = await fetch(`${CONFIG.SUPABASE_URL}/functions/v1/ai-assist`, {
      method: 'POST', headers,
      body: JSON.stringify({ action: 'parse', text, url, areaId: state.soSearchAreaId })
    });
    if (!res.ok) { const errText = await res.text(); throw new Error(`HTTP ${res.status}: ${errText}`); }
    const result = await res.json();
    if (result.error) throw new Error(result.error);
    state._aiParsedProperty = result;
    state._importUrl = url;
    render();
  } catch(e) {
    console.error('AI Parse error:', e);
    alert('AI解析に失敗しました: ' + e.message);
    if (btn) { btn.textContent = '🤖 AIで情報を整理して保存'; btn.disabled = false; }
  }
}

// AI解析結果を保存
async function handleSaveParsed() {
  const parsed = state._aiParsedProperty;
  if (!parsed) return;
  if (!parsed.price || !parsed.land_area) {
    alert('価格と面積が必要です。テキストに含まれているか確認してください。');
    return;
  }

  // 重複チェック（dedup_hash）
  if (parsed.dedup_hash) {
    const existing = state.savedProperties.find(p => p.dedup_hash === parsed.dedup_hash);
    if (existing) {
      const existAddr = existing.address || '住所不明';
      if (!confirm(`⚠️ この物件は既に保存されている可能性があります。\n\n既存: ${existAddr}\n\nそれでも保存しますか？`)) {
        return;
      }
    }
  }

  const prop = buildPropertyFromParsed(parsed);
  const saved = await saveProperty(prop);
  if (saved) {
    state.soModalOpen = false;
    state._importUrl = '';
    state._aiParsedProperty = null;
    render();
  }
}

async function handleToggleComparison(id) {
  await toggleComparison(id);
  render();
}

async function handleDeleteProperty(id) {
  if (!confirm('この物件を削除しますか？')) return;
  await deleteProperty(id);
  render();
}

async function handleGenerateComparison() {
  const btn = event?.target;
  if (btn) { btn.textContent = '生成中...'; btn.disabled = true; }
  const result = await generateComparison();
  if (result) {
    state.soComparison = result;
    state.soView = 'compare';
    backupToLocalStorage();
  }
  render();
}

async function clearAllProperties() {
  if (!confirm('保存した物件をすべて削除しますか？')) return;
  for (const p of [...state.savedProperties]) {
    await deleteProperty(p.id);
  }
  render();
}

// ============================================================
// Bind Events
// ============================================================
function handleAuthSendOtp() {
  const input = document.getElementById('auth-email-input');
  const email = input ? input.value.trim() : '';
  if (!email || !email.includes('@')) { state.authError = 'メールアドレスを入力してください'; render(); return; }
  handleSendOtp(email);
}

function handleAuthVerify() {
  const input = document.getElementById('auth-otp-input');
  const token = input ? input.value.trim() : '';
  if (!token || token.length !== 6) { state.authError = '6桁のコードを入力してください'; render(); return; }
  handleVerifyOtp(state.authEmail, token);
}

function bindEvents() {
  // 認証モーダルのEnterキー対応
  const emailInput = document.getElementById('auth-email-input');
  if (emailInput) emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuthSendOtp(); });
  const otpInput = document.getElementById('auth-otp-input');
  if (otpInput) {
    otpInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuthVerify(); });
    otpInput.focus();
  }
  if (emailInput && state.authModalOpen && state.authStep === 'email') emailInput.focus();
}

// ============================================================
// Initialize
// ============================================================
restoreFromLocalStorage();
render();

// 認証状態の変更を監視
supabaseClient.auth.onAuthStateChange((event, session) => {
  if (session?.user) {
    updateAuthState(session.user);
  } else {
    state.authUser = null;
  }
  render();
});

ensureAuth().then(user => {
  if (user) updateAuthState(user);
  render();
  loadSavedProperties().then(() => {
    backupToLocalStorage();
    if (state.savedProperties.length > 0) render();
  });
  loadSavedComparisons().then(() => render());
  loadUserProfile().then(() => render());
}).catch(e => console.warn('Auth init skipped:', e.message));
</script>
