<script>

      theme: {
        extend: {

            brand: {

<style>
/* --- Global Styles & Resets --- */
body {
    background-color: #fafafa;
    color: #333;
    overflow-x: hidden;
}

/* Glassmorphism effects */
.glass {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.3);
}

/* Smooth Scrolling */
html {
    scroll-behavior: smooth;
}

/* Tab Switcher Styles */
.tab-btn {
    position: relative;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    background: transparent;
}
.tab-btn::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 2px;
    background-color: #3f5787;
    transition: width 0.3s ease;
}
.tab-btn.active {
    color: #3f5787;
    font-weight: 700;
}
.tab-btn.active::after {
    width: 100%;
}

/* --- PATTERN A: Card Scroll --- */
.pattern-a-container {
    display: flex;
    overflow-x: auto;
    gap: 1.5rem;
    padding: 1rem 0.5rem 3rem 0.5rem;
    snap-type: x mandatory;
    scrollbar-width: none; /* Firefox */
}
.pattern-a-container::-webkit-scrollbar {
    display: none; /* Chrome/Safari */
}
.prop-card-a {
    flex: 0 0 340px;
    scroll-snap-align: center;
    border-radius: 24px;
    background: #fff;
    box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    border: 1px solid rgba(0,0,0,0.03);
    overflow: hidden;
    position: relative;
}
.prop-card-a:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.12);
}
.prop-img-wrapper {
    position: relative;
    height: 220px;
    overflow: hidden;
}
.prop-img-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
}
.prop-card-a:hover .prop-img-wrapper img {
    transform: scale(1.05);
}
.badge-rank {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    backdrop-filter: blur(4px);
    z-index: 10;
}
.badge-gold { background: linear-gradient(135deg, #FFDF73 0%, #D4AF37 100%); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
.badge-silver { background: linear-gradient(135deg, #E2E2E2 0%, #A0A0A0 100%); color: #fff;}
.badge-bronze { background: linear-gradient(135deg, #F0C49E 0%, #CD7F32 100%); color: #fff;}

.score-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: white;
    position: absolute;
    bottom: -24px;
    right: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    color: #3f5787;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    z-index: 10;
    border: 2px solid #f5f7fa;
}
.feature-pill {
    background: #f5f7fa;
    color: #64748b;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 500;
}

/* --- PATTERN B: Premium Matrix --- */
.matrix-wrapper {
    border-radius: 24px;
    background: white;
    box-shadow: 0 10px 40px -10px rgba(0,0,0,0.06);
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.04);
}
.matrix-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
}
.matrix-table th, .matrix-table td {
    padding: 1.25rem 1rem;
    text-align: center;
    border-bottom: 1px solid #f1f5f9;
}
.matrix-table th {
    background: #fafafa;
    font-weight: 600;
    color: #475569;
    font-size: 0.875rem;
    position: sticky;
    top: 0;
    z-index: 20;
}
.matrix-table th:first-child, .matrix-table td:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    background: white;
    z-index: 10;
    box-shadow: 2px 0 5px -2px rgba(0,0,0,0.05);
    font-weight: 700;
}
.matrix-table th:first-child { z-index: 30; background: #fafafa; }
.matrix-table tbody tr {
    transition: background-color 0.2s ease;
}
.matrix-table tbody tr:hover {
    background-color: #f8fafc;
}
.matrix-table td:first-child {
    background: inherit;
}
.matrix-table tbody tr:hover td:first-child {
    background-color: #f8fafc;
}

.score-bar-bg { height: 6px; background: #e2e8f0; border-radius: 4px; overflow: hidden; width: 60px; margin: 0 auto; }
.score-bar-fill { height: 100%; border-radius: 4px; background: #3f5787; transition: width 1s ease-out; }

/* --- PATTERN C: Visual Accordion --- */
.accordion-item {
    background: white;
    border-radius: 20px;
    margin-bottom: 1rem;
    box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    border: 1px solid transparent;
    transition: all 0.3s ease;
    overflow: hidden;
}
.accordion-item:hover {
    border-color: #e4eaf1;
    box-shadow: 0 8px 25px rgba(0,0,0,0.06);
}
.accordion-item.active {
    border-color: #cbd6e6;
    box-shadow: 0 10px 30px rgba(59, 87, 135, 0.1);
}
.accordion-header {
    padding: 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 1.5rem;
}
.accordion-img-thumb {
    width: 100px;
    height: 70px;
    border-radius: 12px;
    object-fit: cover;
}
.accordion-content {
    max-height: 0;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    background: #fafafa;
    border-top: 1px solid #f1f5f9;
}
.accordion-item.active .accordion-content {
    max-height: 500px; /* arbitrary large height */
    opacity: 1;
    padding: 2rem;
}
.chevron {
    transition: transform 0.3s ease;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: #f1f5f9;
    color: #64748b;
}
.accordion-item:hover .chevron { background: #e2e8f0; color: #3f5787; }
.accordion-item.active .chevron { transform: rotate(180deg); background: #3f5787; color: white; }

</style>
</head>

</main>

function getBadgeClass(rank) {
    if(rank === 1) return 'badge-gold';
    if(rank === 2) return 'badge-silver';
    if(rank === 3) return 'badge-bronze';
    return 'bg-gray-800 text-white';
}

function getRankText(rank) {
    return `No.${rank}`;
}

// --- Render Functions ---

function renderPatternA() {
    let html = `
        <div class="mb-6 flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-bold text-gray-900">カードスワイプスタイル</h2>

            </div>
        </div>
        <div class="pattern-a-container">
    `;

    properties.forEach(p => {
        const badgeClass = getBadgeClass(p.rank);
        html += `
            <div class="prop-card-a">
                <div class="prop-img-wrapper">
                    <div class="badge-rank ${badgeClass}">${getRankText(p.rank)}</div>
                    <img src="${p.image}" alt="${p.name}">

                        <span class="text-sm text-gray-500 mb-1">${p.priceUnit}</span>
                        <span class="text-xs text-gray-400 mb-1 ml-2">坪単価: ${p.tsuboPrice}万</span>
                    </div>

                    <div class="space-y-2 mb-5">
                        <div class="flex items-center text-sm text-gray-600">
                            <i class="ri-train-line text-brand-400 mr-2"></i> ${p.access}
                        </div>
                        <div class="flex items-center text-sm text-gray-600">
                            <i class="ri-map-pin-time-line text-brand-400 mr-2"></i> 名古屋まで ${p.nagoyaTime}分

                    </div>

                    <button class="w-full py-3 rounded-xl bg-brand-50 text-brand-700 font-bold hover:bg-brand-600 hover:text-white transition-colors duration-300">
                        詳細を見る <i class="ri-arrow-right-line ml-1"></i>
                    </button>
                </div>
            </div>
        `;
    });

    html += `</div>`;
    return html;
}

                                <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                                    <span class="text-gray-500 text-sm">坪単価</span>
                                    <span class="font-bold text-gray-900">${p.tsuboPrice} 万円</span>
                                </div>
                                <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                                    <span class="text-gray-500 text-sm">アクセス</span>
                                    <span class="font-medium text-gray-900">${p.access}</span>
                                </div>
                                <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                                    <span class="text-gray-500 text-sm">名古屋まで</span>
                                    <span class="font-medium text-gray-900">最速 ${p.nagoyaTime} 分</span>
                                </div>
                            </div>

                            <h4 class="text-lg font-bold text-gray-900 border-b pb-2 mb-4 mt-8 border-gray-200">スコア詳細</h4>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <div class="flex justify-between text-xs text-gray-500 mb-1"><span>価格</span><span>${p.scores.price}</span></div>
                                    <div class="h-1.5 w-full bg-gray-200 rounded-full"><div class="h-full bg-brand-500 rounded-full" style="width: ${p.scores.price}%"></div></div>
                                </div>
                                <div>
                                    <div class="flex justify-between text-xs text-gray-500 mb-1"><span>交通</span><span>${p.scores.access}</span></div>
                                    <div class="h-1.5 w-full bg-gray-200 rounded-full"><div class="h-full bg-[#10b981] rounded-full" style="width: ${p.scores.access}%"></div></div>
                                </div>
                            </div>
                            
                            <button class="mt-8 w-full py-3 bg-brand-600 text-white font-bold rounded-xl shadow-lg shadow-brand-600/30 hover:bg-brand-700 transition transform hover:-translate-y-0.5">
                                この物件について問い合わせる
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    });

    html += `</div>`;
    return html;
}


// --- Logic ---
const contentArea = document.getElementById('content-area');
const tabs = document.querySelectorAll('.tab-btn');

function switchPattern(patternId) {
    // Reset active tab
    tabs.forEach(t => t.classList.remove('active', 'font-bold'));
    const activeTab = document.querySelector(`[data-target="${patternId}"]`);
    activeTab.classList.add('active');

    // Fade out
    contentArea.style.opacity = '0';
    
    setTimeout(() => {
        if (patternId === 'pattern-a') contentArea.innerHTML = renderPatternA();
        else if (patternId === 'pattern-b') contentArea.innerHTML = renderPatternB();
        else if (patternId === 'pattern-c') contentArea.innerHTML = renderPatternC();
        
        // Fade in
        contentArea.style.opacity = '1';
    }, 200);
}

// Global function for Accordion (Pattern C)
window.toggleAccordion = function(element) {
    const isActive = element.classList.contains('active');
    // Close all
    document.querySelectorAll('.accordion-item').forEach(item => {
        item.classList.remove('active');
    });
    // Open clicked if it was not active
    if (!isActive) {
        element.classList.add('active');
    }
}

// Event Listeners
tabs.forEach(tab => {
    tab.addEventListener('click', (e) => {
        switchPattern(e.currentTarget.dataset.target);
    });
});

// Init
contentArea.style.transition = 'opacity 0.2s ease-out';
switchPattern('pattern-a');

</script>
