<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物件比較表 B+Aハイブリッド デモ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f3f4f6; color:#1f2937; line-height:1.6; }
.demo-header { background:linear-gradient(135deg,#1e3a5f,#2563eb); color:#fff; padding:24px 16px; text-align:center; }
.demo-header h1 { font-size:20px; margin-bottom:4px; }
.demo-header p { font-size:12px; opacity:0.8; }
.container { max-width:900px; margin:16px auto; padding:0 12px; }

/* カード */
.card { background:#fff; border-radius:12px; border:1px solid #e5e7eb; overflow:hidden; }
.card + .card { margin-top:12px; }

/* サマリーカード */
.summary-bar { display:flex; gap:10px; overflow-x:auto; padding-top:14px; padding-bottom:4px; margin-bottom:12px; }
.summary-card { flex:1; min-width:155px; background:#fff; border-radius:12px; border:2px solid #e5e7eb; padding:14px 12px; text-align:center; cursor:pointer; transition:all 0.2s; position:relative; scroll-snap-align:start; }
.summary-card:hover { border-color:#93c5fd; box-shadow:0 4px 12px rgba(59,130,246,0.1); transform:translateY(-2px); }
.summary-card.best { border-color:#22c55e; }
.summary-card.best::after { content:'👑 おすすめ'; position:absolute; top:-10px; left:50%; transform:translateX(-50%); background:#fef3c7; color:#b45309; font-size:10px; font-weight:700; padding:2px 10px; border-radius:999px; white-space:nowrap; }
.label-chip { display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:8px; font-weight:800; font-size:14px; color:#fff; margin-bottom:6px; }
.summary-name { font-size:11px; font-weight:600; color:#374151; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.summary-score { font-size:28px; font-weight:900; line-height:1.1; }
.summary-score-label { font-size:10px; color:#9ca3af; }
.summary-price { font-size:14px; font-weight:700; color:#1e40af; margin-top:4px; }
.summary-sub { font-size:10px; color:#9ca3af; }

/* AIサマリ */
.ai-summary { padding:14px; background:#eff6ff; border:1px solid #bfdbfe; border-radius:12px; margin-bottom:12px; }
.ai-summary-title { font-size:12px; font-weight:700; color:#1d4ed8; margin-bottom:4px; }
.ai-summary-text { font-size:13px; color:#374151; line-height:1.7; }

/* アコーディオンセクション */
.acc-section { background:#fff; border-radius:12px; border:1px solid #e5e7eb; margin-bottom:10px; overflow:hidden; }
.acc-header { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; cursor:pointer; user-select:none; transition:background 0.15s; }
.acc-header:hover { background:#f9fafb; }
.acc-header h3 { font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; }
.acc-header .count { font-size:11px; color:#9ca3af; font-weight:400; }
.acc-header .chev { font-size:10px; color:#9ca3af; transition:transform 0.3s; }
.acc-section.open .acc-header .chev { transform:rotate(180deg); }
.acc-body { display:none; border-top:1px solid #e5e7eb; }
.acc-section.open .acc-body { display:block; }

/* テーブル行 */
.t-table { width:100%; border-collapse:collapse; }
.t-table th, .t-table td { padding:8px 10px; border-bottom:1px solid #f3f4f6; text-align:left; font-size:12px; vertical-align:top; }
.t-table th { background:#f9fafb; font-weight:600; color:#6b7280; white-space:nowrap; min-width:80px; width:90px; }
.t-table td { color:#1f2937; min-width:120px; }
.t-table tr:last-child td, .t-table tr:last-child th { border-bottom:none; }

/* スコアバー */
.score-bar { display:inline-flex; align-items:center; gap:5px; }
.score-bar-track { width:50px; height:6px; background:#e5e7eb; border-radius:99px; overflow:hidden; }
.score-bar-fill { height:100%; border-radius:99px; }
.score-val { font-size:13px; font-weight:700; }
.highlight-cell { background:#fefce8; }
.best-star { font-size:9px; }

/* ハザードバッジ */
.hz-badge { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; cursor:pointer; transition:background 0.2s; }
.hz-low { background:#dcfce7; color:#15803d; }
.hz-mid { background:#fef3c7; color:#b45309; }
.hz-high { background:#fee2e2; color:#dc2626; }
.hz-badge:hover { opacity:0.8; }
.hz-detail { display:none; margin-top:6px; padding:8px 10px; background:#f8fafc; border-radius:6px; border-left:3px solid #94a3b8; font-size:11px; color:#475569; line-height:1.6; }
.hz-detail.open { display:block; }

/* メモ */
.memo-area { width:100%; padding:6px 8px; border:1px solid #e5e7eb; border-radius:6px; font-size:12px; resize:vertical; outline:none; font-family:inherit; }
.memo-area:focus { border-color:#93c5fd; box-shadow:0 0 0 2px rgba(59,130,246,0.1); }

/* モーダル */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:flex-start; padding:20px 16px; overflow-y:auto; }
.modal-overlay.open { display:flex; }
.modal-box { background:#fff; border-radius:16px; max-width:560px; width:100%; margin:auto; padding:20px; max-height:90vh; overflow-y:auto; }
.modal-close { width:32px; height:32px; border-radius:50%; background:#f3f4f6; border:none; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; color:#6b7280; }
.modal-close:hover { background:#e5e7eb; }

/* 折りたたみ */
.fold-header { display:flex; align-items:center; justify-content:space-between; cursor:pointer; padding:8px 0; border-top:1px solid #f3f4f6; margin-top:8px; }
.fold-header h4 { font-size:12px; font-weight:700; color:#6b7280; display:flex; align-items:center; gap:4px; }
.fold-body { display:none; padding-top:6px; }
.fold-body.open { display:block; }

/* KV */
.kv-row { display:flex; justify-content:space-between; align-items:baseline; padding:7px 0; border-bottom:1px solid #f3f4f6; }
.kv-row:last-child { border-bottom:none; }
.kv-label { font-size:11px; color:#6b7280; }
.kv-value { font-size:12px; font-weight:600; text-align:right; max-width:60%; }

/* グリッド */
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:#e5e7eb; border-radius:8px; overflow:hidden; }
.info-cell { background:#fff; padding:8px 10px; }
.info-cell-label { font-size:10px; color:#9ca3af; margin-bottom:1px; }
.info-cell-value { font-size:12px; font-weight:600; }

/* プログレスバー（モーダル内） */
.m-score-row { display:flex; align-items:center; gap:6px; padding:6px 8px; background:#f9fafb; border-radius:6px; margin-bottom:4px; }
.m-score-label { font-size:11px; color:#6b7280; width:50px; }
.m-score-bar { flex:1; height:5px; background:#e5e7eb; border-radius:99px; overflow:hidden; }
.m-score-fill { height:100%; border-radius:99px; }
.m-score-val { font-size:12px; font-weight:700; width:28px; text-align:right; }

/* Bプラン風 グリッド行 */
.cpt-grid { overflow-x:auto; }
.cpt-row { display:grid; grid-template-columns:90px repeat(var(--cols,5), 1fr); border-bottom:1px solid #f3f4f6; }
.cpt-row:last-child { border-bottom:none; }
.cpt-row-label { padding:9px 10px; font-size:11px; font-weight:600; color:#6b7280; background:#f9fafb; display:flex; align-items:center; white-space:nowrap; }
.cpt-row-cell { padding:9px 10px; font-size:12px; text-align:center; display:flex; align-items:center; justify-content:center; word-break:break-all; }
.cpt-row-cell.highlight { background:#fefce8; font-weight:700; }
.cpt-expand-btn { grid-column:1/-1; padding:6px 10px; font-size:11px; color:#6b7280; cursor:pointer; text-align:center; background:#f9fafb; border-top:1px solid #f3f4f6; transition:background 0.15s; }
.cpt-expand-btn:hover { background:#f3f4f6; color:#374151; }
.cpt-hidden { display:none; }
.cpt-hidden.open { display:grid; grid-template-columns:90px repeat(var(--cols,5), 1fr); }

/* 物件リンク行 */
.prop-link { display:inline-block; padding:3px 10px; background:#eff6ff; color:#2563eb; border-radius:4px; font-size:11px; font-weight:600; text-decoration:none; transition:background 0.15s; }
.prop-link:hover { background:#dbeafe; }

@media (max-width:640px) {
  .summary-card { min-width:130px; }
  .t-table td { min-width:100px; }
  .cpt-row { grid-template-columns:80px repeat(var(--cols,5), 1fr); }
  .cpt-row-cell { font-size:11px; padding:8px 6px; }
}
</style>
</head>

<div class="container">

function riskLevel(text) {
  if (!text) return 'unknown';
  const first = text.split(/[。（(]/)[0].trim();
  if (/^高/.test(first)) return 'high';
  if (/^中/.test(first)) return 'mid';
  if (/^低/.test(first)) return 'low';
  if (first.includes('高')) return 'high';
  if (first.includes('中')) return 'mid';
  return 'low';
}

function riskBadgeHtml(text, id) {
  if (!text) return '<span style="color:#9ca3af;">—</span>';
  const level = riskLevel(text);
  const cls = level === 'high' ? 'hz-high' : level === 'mid' ? 'hz-mid' : 'hz-low';
  const label = level === 'high' ? '高' : level === 'mid' ? '中' : '低';
  return `<div>
    <span class="hz-badge ${cls}" onclick="event.stopPropagation();toggleHzDetail('${id}')">
      ${label === '低' ? '✓' : '⚠'} ${label}リスク <span style="font-size:9px;opacity:0.7;">▼</span>
    </span>
    <div class="hz-detail" id="${id}">${text}</div>

}

// サマリーカード描画
function renderSummary() {
  const maxScore = Math.max(...PROPS.map(p => p.scores.total));
  document.getElementById('summary-bar').innerHTML = PROPS.map((p, i) => `
    <div class="summary-card${p.best ? ' best' : ''}" onclick="openModal(${i})">
      <div class="label-chip" style="background:${p.color};">${LABELS[i]}</div>
      <div class="summary-name">${p.address}</div>
      <div class="summary-score" style="color:${sc(p.scores.total)};">${p.scores.total}</div>
      <div class="summary-score-label">総合スコア</div>
      <div class="summary-price">${p.price}万円</div>
      <div class="summary-sub">${p.area_tsubo}坪 ・ ${p.tsubo_price}万/坪</div>
    </div>
  `).join('');
}

// アコーディオン描画
function renderAccordions() {
  const maxScore = Math.max(...PROPS.map(p => p.scores.total));

  const sections = [
    { id:'scores', icon:'📊', title:'スコア比較', open:true, render: renderScoreSection },
    { id:'basic', icon:'📍', title:'基本情報', open:false, count:'5項目', render: renderBasicSection },
    { id:'check', icon:'⚠️', title:'重要確認項目', open:false, count:'7項目', render: renderCheckSection },
    { id:'build', icon:'🏗️', title:'建築費シミュレーション', open:false, count:'総額比較', render: renderBuildSection },
    { id:'env', icon:'🔍', title:'周辺環境', open:false, count:'6施設', render: renderEnvSection },
    { id:'hazard', icon:'🛡️', title:'ハザード・地盤', open:false, count:'4項目', render: renderHazardSection },
    { id:'aicomment', icon:'💬', title:'AIコメント', open:false, render: renderAICommentSection },
    { id:'memo', icon:'📝', title:'メモ', open:false, render: renderMemoSection },
  ];

  document.getElementById('accordion-sections').innerHTML = sections.map(s => `
    <div class="acc-section${s.open ? ' open' : ''}" id="acc-${s.id}">
      <div class="acc-header" onclick="document.getElementById('acc-${s.id}').classList.toggle('open')">
        <h3>${s.icon} ${s.title} ${s.count ? '<span class="count">（'+s.count+'）</span>' : ''}</h3>
        <span class="chev">▼</span>
      </div>
      <div class="acc-body">${s.render()}</div>
    </div>
  `).join('');
}

function scoreRow(label, key) {
  const vals = PROPS.map(p => p.scores[key]);
  const maxVal = Math.max(...vals);
  return `<tr>
    <th>${label}</th>
    ${PROPS.map((p,i) => {
      const v = vals[i];
      const best = v === maxVal && maxVal > 0;
      return `<td class="${best ? 'highlight-cell' : ''}">
        <div class="score-bar">
          <div class="score-bar-track"><div class="score-bar-fill" style="width:${v}%;background:${sc(v)};"></div></div>
          <span class="score-val" style="color:${sc(v)};">${v}</span>
          ${best ? '<span class="best-star">★</span>' : ''}
        </div>
      </td>`;
    }).join('')}
  </tr>`;
}

function renderScoreSection() {
  const maxTotal = Math.max(...PROPS.map(p => p.scores.total));
  return `<div style="overflow-x:auto;"><table class="t-table">
    <tr><th>総合</th>${PROPS.map(p => {
      const best = p.scores.total === maxTotal;
      return `<td class="${best ? 'highlight-cell' : ''}" style="text-align:center;">
        <span style="font-size:20px;font-weight:900;color:${sc(p.scores.total)};">${p.scores.total}</span>
        ${best ? '👑' : ''}
      </td>`;
    }).join('')}</tr>
    ${scoreRow('🛡️ 安全','safety')}
    ${scoreRow('🏪 利便','convenience')}
    ${scoreRow('💰 コスト','cost')}
    ${scoreRow('🏡 ライフ','lifestyle')}
  </table></div>`;
}

function textRow(label, key, fmt) {
  return `<tr><th>${label}</th>${PROPS.map(p => {
    let v = p[key];
    if (fmt) v = fmt(v, p);
    return `<td>${v || '<span style="color:#d1d5db;">—</span>'}</td>`;
  }).join('')}</tr>`;
}

function renderBasicSection() {
  return `<div style="overflow-x:auto;"><table class="t-table">
    ${textRow('価格','price',(v)=> v ? v.toLocaleString()+'万円' : '—')}
    ${textRow('土地面積','area_tsubo',(v,p)=> v ? v+'坪（'+p.area_m2+'㎡）' : '—')}
    ${textRow('坪単価','tsubo_price',(v)=> v ? v+'万円/坪' : '—')}
    ${textRow('所在地','address')}
    ${textRow('駅距離','station')}
    <tr><th>物件ページ</th>${PROPS.map(p =>
      `<td>${p.url && p.url !== '#' ? '<a href="'+p.url+'" target="_blank" class="prop-link">🔗 物件ページ</a>' : '<a href="'+p.url+'" target="_blank" class="prop-link">🔗 物件ページ</a>'}</td>`
    ).join('')}</tr>
  </table></div>`;
}

function cptRow(label, key, fmt) {
  return `<div class="cpt-row" style="--cols:${PROPS.length}">
    <div class="cpt-row-label">${label}</div>
    ${PROPS.map(p => {
      let v = p[key];
      if (fmt) v = fmt(v, p);
      return `<div class="cpt-row-cell">${v || '<span style="color:#d1d5db;">—</span>'}</div>`;
    }).join('')}
  </div>`;
}

function renderBuildSection() {
  return `<div style="overflow-x:auto;"><table class="t-table">
    ${textRow('最大建築面積','maxBuild')}
    ${textRow('最大延床面積','maxFloor')}

function renderEnvSection() {

  </div>`;

function renderHazardSection() {
  const hazardRow = (label, key) => `<tr><th>${label}</th>${PROPS.map((p,i) =>
    `<td>${riskBadgeHtml(p[key], 'hz-'+key+'-'+i)}</td>`

  return `<div style="overflow-x:auto;"><table class="t-table">
    ${hazardRow('洪水リスク','flood')}

function renderMemoSection() {

function closeModal() {
  document.getElementById('prop-modal').classList.remove('open');
}

function toggleFold(id) {
  document.getElementById(id).classList.toggle('open');
}

// 初期化

renderAccordions();
</script>
