name: Threads Weekly Analysis

on:
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜 AM9:00 JST (UTC 00:00)
  workflow_dispatch:      # 手動実行も可能

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    concurrency:
      group: threads-analyze
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run weekly analysis
        run: node scripts/threads/analyzer.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '6981924809'

      - name: Commit insights
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/threads-insights.json
          git diff --staged --quiet || git commit -m "chore: weekly insights [$(date -u +%Y-%m-%d)]"
          git push
